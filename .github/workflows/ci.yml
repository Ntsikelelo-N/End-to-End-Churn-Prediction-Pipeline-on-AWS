# .github/workflows/ci.yml — Continuous Integration pipeline.
#
# CHANGED: There was no CI. A Capitec or Discovery engineer will look for
# a green badge as the first credibility signal. This workflow runs on every
# push to main and every pull request, ensuring tests never silently break.
#
# Triggers: push to main, any pull request.
# Jobs: lint → test (with coverage upload to Codecov)

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev dependencies
        run: pip install black flake8 isort

      - name: Check formatting (black)
        run: black src tests --check --line-length=100

      - name: Check import order (isort)
        run: isort src tests --check-only

      - name: Lint (flake8)
        run: flake8 src tests --max-line-length=100 --ignore=E501,W503

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package with all extras
        run: pip install -e ".[dev,ml]"

      - name: Run tests with coverage
        run: |
          pytest tests \
            --cov=src/churn_pipeline \
            --cov-report=xml \
            --cov-report=term-missing \
            -v

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
